<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Morning Ledger</title>
<link rel="apple-touch-icon" href="/icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ledger" />
<meta name="theme-color" content="#F7F5EF" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="paper">
    <div class="sheet">
      <div class="masthead">
        <div class="ear" id="ear-weather">UPTON WEATHER<br /><span class="ear-big">…</span></div>
        <div>
          <div class="masthead-title">The Morning Ledger</div>
          <div class="masthead-sub">Upton · Lincoln · Truro · Provincetown Harbor Edition</div>
        </div>
        <div class="ear right" id="ear-markets">MARKET GLANCE<br /><span class="ear-big">…</span></div>
      </div>

      <div class="rule heavy"></div>
      <div class="date-bar">
        <span id="date-line">—</span>
        <button class="refresh" id="refresh-btn">↻ FRESH EDITION</button>
      </div>
      <div class="rule heavy"></div>

      <div class="columns">
        <div class="col" id="col-weather">
          <div class="section-label">Weather &amp; Marine</div>
          <div id="weather-body" class="loading">
            <div class="loading-line" style="width:88%"></div>
            <div class="loading-line" style="width:74%"></div>
            <div class="loading-line" style="width:80%"></div>
          </div>
          <div class="rule"></div>
          <div id="marine-body" class="loading">
            <div class="loading-line" style="width:70%"></div>
            <div class="loading-line" style="width:60%"></div>
          </div>
        </div>

        <div class="col" id="col-sports">
          <div class="section-label">Sporting News</div>
          <div id="sports-body" class="loading">
            <div class="loading-line" style="width:90%"></div>
            <div class="loading-line" style="width:65%"></div>
            <div class="loading-line" style="width:80%"></div>
          </div>
        </div>

        <div class="col" id="col-markets">
          <div class="section-label">Financial Markets</div>
          <div id="markets-body" class="loading">
            <div class="loading-line" style="width:85%"></div>
            <div class="loading-line" style="width:70%"></div>
            <div class="loading-line" style="width:75%"></div>
          </div>
        </div>
      </div>

      <div class="footer-rule"></div>

      <div class="wide-section" id="section-nightsky">
        <div class="section-label">Night Sky</div>
        <div id="nightsky-body" class="loading">
          <div class="loading-line" style="width:80%"></div>
          <div class="loading-line" style="width:65%"></div>
        </div>
      </div>

      <div class="wide-section" id="section-news">
        <div class="section-label">Financial News</div>
        <div id="news-body" class="loading">
          <div class="loading-line" style="width:85%"></div>
          <div class="loading-line" style="width:70%"></div>
        </div>
      </div>

      <div class="wide-section" id="section-onthisday">
        <div class="section-label">On This Day</div>
        <div id="onthisday-body" class="loading">
          <div class="loading-line" style="width:75%"></div>
        </div>
      </div>

      <div class="footer">COMPILED FRESH EACH MORNING · NWS/NOAA · MLB STATS API · FINNHUB · EIA · ALL FIGURES AS OF PRESS TIME</div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
