[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Cache the data functions at the edge for 10 minutes so repeated visits
# during the same morning don't re-hit every upstream API.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=600, stale-while-revalidate=300"

# Real estate listings via RentCast's free tier (50 calls/month) — cache for
# 3 days since listings don't change meaningfully day to day, keeping
# monthly usage well under budget (3 towns x ~10 refreshes/month = 30 calls).
[[headers]]
  for = "/.netlify/functions/realestate"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=259200, stale-while-revalidate=86400"
